<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi5 Education Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#0d6efd,#198754);
  color:white;
  padding:16px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:1000;
  font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* MENU */
.menu{
  position:absolute;
  left:15px;
  top:14px;
  font-size:24px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-280px;
  top:0;
  width:280px;
  height:100%;
  background:#1e1e1e;
  color:white;
  transition:0.3s;
  padding-top:60px;
  z-index:2000;
}

.sidebar a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
}

.sidebar a:hover{
  background:#333;
}

/* CLOSE */
.close{
  position:absolute;
  top:10px;
  right:10px;
  font-size:20px;
  cursor:pointer;
}

/* MAIN */
.container{
  padding:15px;
}

/* DASHBOARD */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.card{
  background:white;
  padding:18px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card:hover{
  background:#eef5ff;
}

/* ITEMS */
.item{
  background:white;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.item:hover{
  background:#eef5ff;
}

/* SEARCH */
.search input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:6px 10px;
  margin-bottom:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
<span class="menu" onclick="toggle()">☰</span>
Hi5 Education Centre
</header>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<div class="close" onclick="toggle()">❌</div>

<a href="#" onclick="home()">🏠 Dashboard</a>
<a href="#" onclick="openFolder('Nursery')">Nursery</a>
<a href="#" onclick="openFolder('Primary')">Primary</a>
<a href="#" onclick="openFolder('Secondary')">Secondary</a>
<a href="#" onclick="openFolder('Tertiary')">Tertiary</a>
<a href="#">ℹ About Us</a>

</div>

<!-- MAIN -->
<div class="container" id="content">

<h2>Main Dashboard</h2>

<div class="search">
<input type="text" placeholder="Search materials..." onkeyup="search(this.value)">
</div>

<div class="cards">
<div class="card" onclick="openFolder('Nursery')">Nursery</div>
<div class="card" onclick="openFolder('Primary')">Primary</div>
<div class="card" onclick="openFolder('Secondary')">Secondary</div>
<div class="card" onclick="openFolder('Tertiary')">Tertiary</div>
</div>

</div>

<script>

let repo="hi5educentre256/hi5educentre256.github.io";
let stack=[];

/* MENU */
function toggle(){
  let sb=document.getElementById("sidebar");
  sb.style.left = (sb.style.left==="0px") ? "-280px" : "0px";
}

function home(){
  location.reload();
}

/* BACK SYSTEM */
function back(){
  if(stack.length>0){
    document.getElementById("content").innerHTML = stack.pop();
  } else {
    home();
  }
}

/* LEVEL 1 */
function openFolder(folder){

stack.push(document.getElementById("content").innerHTML);

document.getElementById("content").innerHTML="<h2>"+folder+"</h2><p>Loading...</p>";

fetch(`https://api.github.com/repos/${repo}/contents/${folder}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='back()'>⬅ Back</button><h2>"+folder+"</h2>";

data.forEach(f=>{
html+=`<div class='item' onclick="openClass('${folder}/${f.name}')">📁 ${f.name}</div>`;
});

document.getElementById("content").innerHTML=html;

});

}

/* LEVEL 2 */
function openClass(path){

stack.push(document.getElementById("content").innerHTML);

fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='back()'>⬅ Back</button><h2>"+path+"</h2>";

data.forEach(f=>{
html+=`<div class='item' onclick="openMaterials('${path}/${f.name}')">📂 ${f.name}</div>`;
});

document.getElementById("content").innerHTML=html;

});

}

/* LEVEL 3 (FIXED MATERIAL DISPLAY) */
function openMaterials(path){

stack.push(document.getElementById("content").innerHTML);

fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='back()'>⬅ Back</button><h2>"+path+"</h2>";

data.forEach(f=>{
if(f.name.endsWith(".pdf")){
html+=`<div class='item' onclick="window.open('${f.download_url}','_blank')">📄 ${f.name}</div>`;
}
});

document.getElementById("content").innerHTML=html;

});

}

/* SEARCH */
function search(q){
  if(q.length<2) return;

  fetch(`https://api.github.com/repos/${repo}/contents/`)
  .then(r=>r.json())
  .then(data=>{

    let html="<h2>Search Results</h2>";

    data.forEach(f=>{
      html+=`<div class='item' onclick="openFolder('${f.name}')">📁 ${f.name}</div>`;
    });

    document.getElementById("content").innerHTML=html;

  });
}

</script>

</body>
</html>
