<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi5 Education Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* HEADER */
header{
  background: linear-gradient(135deg,#0d6efd,#198754);
  color:white;
  padding:20px 18px;
  text-align:center;
  font-size:22px;
  font-weight:800;
  position:sticky;
  top:0;
  z-index:1000;
}

.menu{
  position:absolute;
  left:15px;
  top:16px;
  font-size:30px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-300px;
  top:0;
  width:300px;
  height:100%;
  background:#0f172a;
  color:white;
  transition:0.35s;
  padding-top:70px;
  z-index:2000;
}

.sidebar a{
  display:block;
  padding:16px;
  font-size:18px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid #1f2937;
}

.sidebar a:hover{
  background:#1f2937;
}

.close{
  position:absolute;
  top:15px;
  right:15px;
  font-size:24px;
  cursor:pointer;
}

/* MAIN */
.container{
  padding:15px;
}

h1{
  font-size:32px;
  font-weight:900;
  background: linear-gradient(135deg,#0d6efd,#198754);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SEARCH */
.search input{
  width:100%;
  padding:16px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ccc;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:16px;
}

.card{
  background:white;
  padding:30px;
  border-radius:18px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
  background:#eef5ff;
}

/* ITEMS */
.item{
  background:white;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#0d6efd;
  color:white;
  cursor:pointer;
  margin-bottom:10px;
}

/* ================= STEP 2: WHATSAPP CHAT STYLE ================= */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width:62px;
  height:62px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  z-index:9999;
  text-decoration:none;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<header>
<span class="menu" onclick="toggle()">☰</span>
Hi5 Education Centre
</header>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<div class="close" onclick="toggle()">❌</div>

<a href="#" onclick="go('home')">🏠 Dashboard ➜</a>
<a href="#" onclick="go('Nursery')">📚 Nursery ➜</a>
<a href="#" onclick="go('Primary')">📘 Primary ➜</a>
<a href="#" onclick="go('Secondary')">📗 Secondary ➜</a>
<a href="#" onclick="go('Tertiary')">🎓 Tertiary ➜</a>
<a href="#" onclick="about()">ℹ About Us ➜</a>

</div>

<!-- MAIN -->
<div class="container" id="content">

<h1>Main Dashboard</h1>

<div class="search">
<input type="text" placeholder="🔍 Search materials..." onkeyup="search(this.value)">
</div>

<div class="cards">
<div class="card" onclick="openFolder('Nursery')">📚 Nursery</div>
<div class="card" onclick="openFolder('Primary')">📘 Primary</div>
<div class="card" onclick="openFolder('Secondary')">📗 Secondary</div>
<div class="card" onclick="openFolder('Tertiary')">🎓 Tertiary</div>
</div>

</div>

<script>

let repo="hi5educentre256/hi5educentre256.github.io";
let stack=[];

/* MENU */
function toggle(){
  let sb=document.getElementById("sidebar");
  sb.style.left = (sb.style.left==="0px") ? "-300px" : "0px";
}

/* NAV */
function go(target){
document.getElementById("sidebar").style.left = "-300px";
if(target==="home") location.reload();
else openFolder(target);
}

/* BACK */
function back(){
if(stack.length>0){
document.getElementById("content").innerHTML = stack.pop();
}
}

/* LEVEL 1 */
function openFolder(folder){

stack.push(document.getElementById("content").innerHTML);

fetch(`https://api.github.com/repos/${repo}/contents/${folder}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='back()'>⬅ Back</button><h2>"+folder+"</h2>";

data.forEach(f=>{
html+=`<div class='item' onclick="openClass('${folder}/${f.name}')">📁 ${f.name}</div>`;
});

document.getElementById("content").innerHTML=html;

});

}

/* LEVEL 2 */
function openClass(path){

stack.push(document.getElementById("content").innerHTML);

fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='back()'>⬅ Back</button><h2>"+path+"</h2>";

data.forEach(f=>{
html+=`<div class='item' onclick="openMaterials('${path}/${f.name}')">📂 ${f.name}</div>`;
});

document.getElementById("content").innerHTML=html;

});

}

/* LEVEL 3 */
function openMaterials(path){

stack.push(document.getElementById("content").innerHTML);

fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='back()'>⬅ Back</button><h2>"+path+"</h2>";

data.forEach(f=>{
if(f.name.endsWith(".pdf")){
html+=`<div class='item' onclick="window.open('${f.download_url}','_blank')">📄 ${f.name}</div>`;
}
});

document.getElementById("content").innerHTML=html;

});

}

/* SEARCH */
function search(q){
if(q.length<2) return;

fetch(`https://api.github.com/repos/${repo}/git/trees/main?recursive=1`)
.then(r=>r.json())
.then(data=>{

let html="<h2>Search Results</h2>";
let found=false;

data.tree.forEach(f=>{
if(f.path.includes(q) && f.path.endsWith(".pdf")){
found=true;
html+=`<div class='item' onclick="window.open('https://raw.githubusercontent.com/${repo}/main/${f.path}','_blank')">📄 ${f.path}</div>`;
}
});

if(!found) html+="<p>No results found</p>";

document.getElementById("content").innerHTML=html;

});
}

/* ABOUT */
function about(){

document.getElementById("sidebar").style.left = "-300px";

stack.push(document.getElementById("content").innerHTML);

document.getElementById("content").innerHTML=`
<button onclick="back()">⬅ Back</button>

<h2>About Hi5 Education Centre</h2>

<div class="item"><b>Founder:</b> Isa Kiggundu</div>
<div class="item"><b>Motto:</b> Learn Today, Lead Tomorrow</div>

<h2>Contact</h2>

<div class="item">📞 +256702234701</div>
<div class="item">📧 hi5educentre256@gmail.com</div>
`;

}

</script>

</body>
</html>
