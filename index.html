<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi5 Education Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f6f9;
}

header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container{
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card:hover{
  background:#e3f2fd;
}

.back{
  color:#1e88e5;
  cursor:pointer;
  margin-bottom:10px;
  display:none;
}

.file{
  padding:10px;
  background:#fff;
  margin:8px 0;
  border-left:4px solid #1e88e5;
  cursor:pointer;
}
</style>
</head>

<body>

<header>📚 Hi5 Education Centre LMS</header>

<div class="container">

<div id="home">

  <div class="card" onclick="openSection('Nursery')">Nursery</div>
  <div class="card" onclick="openSection('Primary')">Primary</div>
  <div class="card" onclick="openSection('Secondary')">Secondary</div>
  <div class="card" onclick="openSection('Tertiary')">Tertiary</div>

</div>

<div id="section" style="display:none;">

  <div class="back" onclick="goBack()">⬅ Back</div>

  <h2 id="title"></h2>

  <div id="content"></div>

</div>

</div>

<script>

let repo = "hi5educentre256/hi5educentre256.github.io";

function openSection(name){
  document.getElementById("home").style.display="none";
  document.getElementById("section").style.display="block";
  document.querySelector(".back").style.display="block";
  document.getElementById("title").innerText = name;

  loadFiles(name);
}

function goBack(){
  document.getElementById("home").style.display="block";
  document.getElementById("section").style.display="none";
  document.getElementById("content").innerHTML="";
}

async function loadFiles(folder){
  document.getElementById("content").innerHTML="Loading...";

  let url = `https://api.github.com/repos/${repo}/contents/${folder}`;

  let res = await fetch(url);
  let data = await res.json();

  let output = "";

  data.forEach(item=>{
    if(item.type==="file"){
      output += `<div class="file" onclick="window.open('${item.download_url}','_blank')">
        📄 ${item.name}
      </div>`;
    }
  });

  document.getElementById("content").innerHTML = output;
}

</script>

</body>
</html>
