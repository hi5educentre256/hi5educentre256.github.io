<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi5 Education Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

header{
  background: linear-gradient(135deg,#0d6efd,#198754);
  color:white;
  padding:20px 18px;
  text-align:center;
  font-size:22px;
  font-weight:800;
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
  position:sticky;
  top:0;
  z-index:1000;
}

.menu{
  position:absolute;
  left:15px;
  top:16px;
  font-size:30px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-300px;
  top:0;
  width:300px;
  height:100%;
  background:#0f172a;
  color:white;
  transition:0.35s;
  padding-top:70px;
  z-index:2000;
}

.sidebar a{
  display:block;
  padding:16px;
  font-size:18px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid #1f2937;
}

.sidebar a:hover{
  background:#1f2937;
}

.close{
  position:absolute;
  top:15px;
  right:15px;
  font-size:24px;
  cursor:pointer;
}

/* MAIN */
.container{
  padding:15px;
}

h1{
  font-size:34px;
  font-weight:900;
  margin:10px 0;
  background: linear-gradient(135deg,#0d6efd,#198754);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.search input{
  width:100%;
  padding:16px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #d0d7e2;
  outline:none;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:16px;
}

.card{
  background:white;
  padding:30px;
  border-radius:18px;
  text-align:center;
  font-weight:700;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  background:#eef5ff;
}

.item{
  background:white;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 14px rgba(0,0,0,0.3);
  z-index:9999;
}

/* CONTACT HIGHLIGHT STYLES */
.contact-phone{
  background:#e8f5e9;
  border-left:5px solid #25D366;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
}

.contact-email{
  background:#e3f2fd;
  border-left:5px solid #0d6efd;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
}

.contact-phone a,
.contact-email a{
  color:#111;
  text-decoration:none;
  font-weight:600;
}

</style>
</head>

<body>

<header>
<span class="menu" onclick="toggle()">☰</span>
Hi5 Education Centre
</header>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<div class="close" onclick="toggle()">❌</div>

<a href="#" onclick="go('home')">🏠 Dashboard ➜</a>
<a href="#" onclick="go('Nursery')">📚 Nursery ➜</a>
<a href="#" onclick="go('Primary')">📘 Primary ➜</a>
<a href="#" onclick="go('Secondary')">📗 Secondary ➜</a>
<a href="#" onclick="go('Tertiary')">🎓 Tertiary ➜</a>
<a href="#" onclick="about()">ℹ About Us ➜</a>

</div>

<!-- MAIN -->
<div class="container" id="content">

<h1>Main Dashboard</h1>

<div class="search">
<input type="text" placeholder="🔍 Search materials..." onkeyup="search(this.value)">
</div>

<div class="cards">
<div class="card" onclick="openFolder('Nursery')">📚 Nursery</div>
<div class="card" onclick="openFolder('Primary')">📘 Primary</div>
<div class="card" onclick="openFolder('Secondary')">📗 Secondary</div>
<div class="card" onclick="openFolder('Tertiary')">🎓 Tertiary</div>
</div>

</div>

<script>

let repo="hi5educentre256/hi5educentre256.github.io";
let stack=[];

function toggle(){
  let sb=document.getElementById("sidebar");
  sb.style.left = (sb.style.left==="0px") ? "-300px" : "0px";
}

function go(target){
document.getElementById("sidebar").style.left = "-300px";
if(target==="home") location.reload();
else openFolder(target);
}

function openFolder(folder){
stack.push(document.getElementById("content").innerHTML);

fetch(`https://api.github.com/repos/${repo}/contents/${folder}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='history.back()'>⬅ Back</button><h2>"+folder+"</h2>";

data.forEach(f=>{
html+=`<div class='item'>📁 ${f.name}</div>`;
});

document.getElementById("content").innerHTML=html;

});
}

/* ABOUT (UPDATED CONTACT ONLY) */
function about(){

document.getElementById("sidebar").style.left = "-300px";

stack.push(document.getElementById("content").innerHTML);

document.getElementById("content").innerHTML=`
<button onclick="back()">⬅ Back</button>

<h2>About Hi5 Education Centre</h2>

<div class="item"><b>Founder:</b> Isa Kiggundu</div>
<div class="item"><b>Motto:</b> Learn Today, Lead Tomorrow</div>

<h2>Contact Us</h2>

<div class="contact-phone">
📞 Phone:
<a href="tel:+256702234701">+256 702 234 701</a>
</div>

<div class="contact-email">
📧 Email:
<a href="mailto:hi5educentre256@gmail.com">hi5educentre256@gmail.com</a>
</div>
`;

}

</script>

<!-- WHATSAPP ICON -->
<a class="whatsapp" href="https://wa.me/256702234701" target="_blank">

width="30" height="30" fill="white">

</svg>

</a>

</body>
</html>
