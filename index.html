<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi5 Education Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #0b5ed7, #198754);
  color: white;
  padding: 15px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* HAMBURGER */
.menu-btn {
  position: absolute;
  left: 15px;
  top: 15px;
  font-size: 26px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -250px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #222;
  color: white;
  transition: 0.3s;
  padding-top: 60px;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover {
  background: #444;
}

/* DASHBOARD */
.container {
  padding: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  text-align: center;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  font-weight: bold;
}

.card:hover {
  background: #e9f2ff;
}

/* FILE LIST */
.files {
  margin-top: 20px;
}

.file {
  background: white;
  margin: 8px 0;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.file:hover {
  background: #e6f7ff;
}

</style>
</head>

<body>

<header>
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  Hi5 Education Centre
</header>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <a href="#" onclick="loadDashboard()">🏠 Dashboard</a>
  <a href="#" onclick="loadFolder('Nursery')">Nursery</a>
  <a href="#" onclick="loadFolder('Primary')">Primary</a>
  <a href="#" onclick="loadFolder('Secondary')">Secondary</a>
  <a href="#" onclick="loadFolder('Tertiary')">Tertiary</a>
  <a href="#">🔍 Search (coming soon)</a>
  <a href="#">ℹ About Us</a>
</div>

<!-- MAIN -->
<div class="container">
  <div id="content">
    
    <h2>Main Dashboard</h2>

    <div class="cards">
      <div class="card" onclick="loadFolder('Nursery')">Nursery</div>
      <div class="card" onclick="loadFolder('Primary')">Primary</div>
      <div class="card" onclick="loadFolder('Secondary')">Secondary</div>
      <div class="card" onclick="loadFolder('Tertiary')">Tertiary</div>
    </div>

  </div>
</div>

<script>

let repo = "hi5educentre256/hi5educentre256.github.io";

function toggleMenu(){
  let sb = document.getElementById("sidebar");
  sb.style.left = (sb.style.left === "0px") ? "-250px" : "0px";
}

function loadDashboard(){
  document.getElementById("content").innerHTML = `
    <h2>Main Dashboard</h2>
    <div class="cards">
      <div class="card" onclick="loadFolder('Nursery')">Nursery</div>
      <div class="card" onclick="loadFolder('Primary')">Primary</div>
      <div class="card" onclick="loadFolder('Secondary')">Secondary</div>
      <div class="card" onclick="loadFolder('Tertiary')">Tertiary</div>
    </div>
  `;
}

/* AUTO FILE LOADER */
function loadFolder(folder){
  document.getElementById("content").innerHTML = "<h2>" + folder + "</h2><div class='files'>Loading...</div>";

  fetch(`https://api.github.com/repos/${repo}/contents/${folder}`)
  .then(res => res.json())
  .then(data => {
    let html = "<h2>" + folder + "</h2><div class='files'>";
    
    data.forEach(file => {
      if(file.name.endsWith(".pdf")){
        html += `<div class='file' onclick="window.open('${file.download_url}','_blank')">
        📄 ${file.name}
        </div>`;
      } else {
        html += `<div class='file' onclick="loadSubFolder('${folder}/${file.name}')">
        📁 ${file.name}
        </div>`;
      }
    });

    html += "</div>";
    document.getElementById("content").innerHTML = html;
  });
}

/* SUBFOLDERS */
function loadSubFolder(path){
  document.getElementById("content").innerHTML = "<h2>" + path + "</h2><div class='files'>Loading...</div>";

  fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
  .then(res => res.json())
  .then(data => {
    let html = "<h2>" + path + "</h2><div class='files'>";
    
    data.forEach(file => {
      if(file.name.endsWith(".pdf")){
        html += `<div class='file' onclick="window.open('${file.download_url}','_blank')">
        📄 ${file.name}
        </div>`;
      }
    });

    html += "</div>";
    document.getElementById("content").innerHTML = html;
  });
}

</script>

</body>
</html>
