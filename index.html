<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi5 Education Centre</title><style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

header{
  background:linear-gradient(90deg,#0d6efd,#198754);
  color:white;
  padding:14px 50px 14px 14px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.menu{position:absolute;right:12px;top:10px;font-size:26px;cursor:pointer;}

.banner{
  background:#fff;
  margin:10px;
  padding:16px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.banner h3{
  font-size:34px;
  color:#0d6efd;
  margin:5px;
  text-transform:uppercase;
}

.banner p{
  font-size:11px;
  color:#333;
}

.sidebar{
  position:fixed;
  left:-300px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  color:white;
  transition:0.3s;
  padding-top:60px;
  z-index:2000;
}

.sidebar a{
  display:block;
  padding:14px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar a:hover{background:#333;}

.close{position:absolute;top:10px;right:10px;cursor:pointer;}

.container{padding:15px;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
}

.card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

.item{
  background:#fff;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

.item:hover{background:#eef5ff;}

button{
  padding:8px 12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:4px;
}

#pdfModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
}

#pdfFrame{
  width:100%;
  height:90%;
  border:none;
}

</style></head>
<body><header>
Hi5 Education Centre
<span class="menu" onclick="toggle()">☰</span>
</header><div class="banner">
  <h3>HI5 EDUCATION CENTRE</h3>
  <p>Learn Today, Lead Tomorrow</p>
</div><div id="sidebar" class="sidebar">
  <div class="close" onclick="toggle()">❌</div>
  <a href="#" onclick="loadRoot()">🏠 Dashboard</a>
  <a href="#" onclick="loadLevel('Nursery')">Nursery</a>
  <a href="#" onclick="loadLevel('Primary')">Primary</a>
  <a href="#" onclick="loadLevel('Secondary')">Secondary</a>
  <a href="#" onclick="loadLevel('Tertiary')">Tertiary</a>
</div><div class="container" id="content">
  <h2>Main Dashboard</h2>
  <div class="cards">
    <div class="card" onclick="loadLevel('Nursery')">Nursery</div>
    <div class="card" onclick="loadLevel('Primary')">Primary</div>
    <div class="card" onclick="loadLevel('Secondary')">Secondary</div>
    <div class="card" onclick="loadLevel('Tertiary')">Tertiary</div>
  </div>
</div><div id="pdfModal">
  <button onclick="closePdf()">Close</button>
  <iframe id="pdfFrame"></iframe>
</div><script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script><script>
// 🔥 REPLACE WITH YOUR FIREBASE CONFIG BELOW
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

let currentList = [];
let currentIndex = 0;

function toggle(){
  let sb=document.getElementById("sidebar");
  sb.style.left = sb.style.left==="0px"?"-300px":"0px";
}

function loadRoot(){
  location.reload();
}

function loadLevel(level){
  document.getElementById("content").innerHTML="Loading...";

  let ref = storage.ref(level);

  ref.listAll().then(async res=>{
    let html="<button onclick='loadRoot()'>⬅ Back</button><h2>"+level+"</h2>";
    currentList=[];

    for(let item of res.items){
      let url = await item.getDownloadURL();
      currentList.push(url);

      html += `<div class='item' onclick='openPdf(${currentList.length-1})'>📄 ${item.name}</div>`;
    }

    document.getElementById("content").innerHTML=html;
  });
}

function openPdf(i){
  currentIndex=i;
  document.getElementById("pdfFrame").src=currentList[i];
  document.getElementById("pdfModal").style.display="block";
}

function closePdf(){
  document.getElementById("pdfModal").style.display="none";
}
</script></body>
</html>
