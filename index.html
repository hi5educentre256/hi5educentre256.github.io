<!DOCTYPE html>
<html>
<head>
  <title>Hi5 Education Centre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e88e5;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .card:hover {
      background: #e3f2fd;
    }

    .file {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .file a {
      text-decoration: none;
      color: #1e88e5;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      background: #1e88e5;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h2>Hi5 Education Centre LMS</h2>
</header>

<div class="container">

  <h3>Select Level</h3>

  <button onclick="loadFolder('Nursery')">Nursery</button>
  <button onclick="loadFolder('Primary')">Primary</button>
  <button onclick="loadFolder('Secondary')">Secondary</button>
  <button onclick="loadFolder('Tertiary')">Tertiary</button>

  <div id="output"></div>

</div>

<script>
async function loadFolder(folder) {
  document.getElementById("output").innerHTML = "Loading...";

  let url = `https://api.github.com/repos/hi5educentre256/hi5educentre256.github.io/contents/${folder}`;

  let res = await fetch(url);
  let data = await res.json();

  let html = `<h3>${folder}</h3>`;

  data.forEach(item => {
    if(item.type === "dir") {
      html += `<div class="card" onclick="loadSubFolder('${folder}/${item.name}')">📁 ${item.name}</div>`;
    }
  });

  document.getElementById("output").innerHTML = html;
}

async function loadSubFolder(path) {
  document.getElementById("output").innerHTML = "Loading...";

  let url = `https://api.github.com/repos/hi5educentre256/hi5educentre256.github.io/contents/${path}`;

  let res = await fetch(url);
  let data = await res.json();

  let html = `<h3>${path}</h3>`;

  data.forEach(item => {
    if(item.type === "file") {
      html += `<div class="file">
        📄 <a href="${item.download_url}" target="_blank">${item.name}</a>
      </div>`;
    }

    if(item.type === "dir") {
      html += `<div class="card" onclick="loadSubFolder('${path}/${item.name}')">📁 ${item.name}</div>`;
    }
  });

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
