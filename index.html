<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi5 Education Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

header{
  background:linear-gradient(90deg,#0d6efd,#198754);
  color:white;
  padding:14px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.menu{
  position:absolute;
  left:15px;
  top:12px;
  font-size:24px;
  cursor:pointer;
}

.sidebar{
  position:fixed;
  left:-270px;
  top:0;
  width:270px;
  height:100%;
  background:#1f1f1f;
  color:white;
  transition:0.3s;
  padding-top:60px;
  z-index:2000;
}

.sidebar a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
}

.sidebar a:hover{
  background:#333;
}

.close{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
  font-size:20px;
}

.container{
  padding:15px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.card{
  background:white;
  padding:18px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  font-weight:bold;
}

.item{
  background:white;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.item:hover{
  background:#eef5ff;
}

.search{
  margin:10px 0;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<span class="menu" onclick="toggle()">☰</span>
Hi5 Education Centre
</header>

<div id="sidebar" class="sidebar">
<div class="close" onclick="toggle()">❌</div>

<a href="#" onclick="home()">🏠 Dashboard</a>
<a href="#" onclick="openFolder('Nursery')">Nursery</a>
<a href="#" onclick="openFolder('Primary')">Primary</a>
<a href="#" onclick="openFolder('Secondary')">Secondary</a>
<a href="#" onclick="openFolder('Tertiary')">Tertiary</a>
<a href="#">ℹ About Us</a>

</div>

<div class="container" id="content">

<h2>Main Dashboard</h2>

<div class="search">
<input type="text" placeholder="Search materials..." onkeyup="searchFiles(this.value)">
</div>

<div class="cards">
<div class="card" onclick="openFolder('Nursery')">Nursery</div>
<div class="card" onclick="openFolder('Primary')">Primary</div>
<div class="card" onclick="openFolder('Secondary')">Secondary</div>
<div class="card" onclick="openFolder('Tertiary')">Tertiary</div>
</div>

</div>

<script>
let repo="hi5educentre256/hi5educentre256.github.io";
let allFiles = [];

async function loadAllFiles(path=""){
  let res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`);
  let data = await res.json();

  let files = [];

  for(let item of data){

    if(item.type === "file"){
      files.push(item);
    }

    if(item.type === "dir"){
      let sub = await loadAllFiles(item.path);
      files = files.concat(sub);
    }
  }

  return files;
}

loadAllFiles().then(data=>{
  allFiles = data;
});
}
let historyStack=[];

function toggle(){
  let sb=document.getElementById("sidebar");
  sb.style.left = sb.style.left==="0px" ? "-270px" : "0px";
}

function home(){
  location.reload();
}

function openFolder(folder){
  historyStack.push(document.getElementById("content").innerHTML);

  document.getElementById("content").innerHTML="<h2>"+folder+"</h2><p>Loading...</p>";

  fetch(`https://api.github.com/repos/${repo}/contents/${folder}`)
  .then(r=>r.json())
  .then(data=>{

    let html="<button onclick='back()'>⬅ Back</button><h2>"+folder+"</h2>";

    data.forEach(f=>{

      if(f.name.endsWith(".pdf")){
        html+=`<div class="item" onclick="window.open('${f.download_url}','_blank')">📄 ${f.name}</div>`;
      } else {
        html+=`<div class="item" onclick="openSub('${folder}/${f.name}')">📁 ${f.name}</div>`;
      }

    });

    document.getElementById("content").innerHTML=html;
  });
}

function openSub(path){

historyStack.push(document.getElementById("content").innerHTML);

document.getElementById("content").innerHTML="<h2>"+path+"</h2><p>Loading...</p>";

fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
.then(r=>r.json())
.then(data=>{

let html="<button onclick='back()'>⬅ Back</button><h2>"+path+"</h2>";

data.forEach(f=>{
if(f.name.endsWith(".pdf")){
html+=`<div class="item" onclick="window.open('${f.download_url}','_blank')">📄 ${f.name}</div>`;
}
});

document.getElementById("content").innerHTML=html;

});

}

function back(){
  if(historyStack.length>0){
    document.getElementById("content").innerHTML=historyStack.pop();
  } else {
    home();
  }
}

function searchFiles(query){

  query = query.toLowerCase();

  if(query.length < 2){
    return;
  }

  let results = allFiles.filter(f =>
    f.name.toLowerCase().includes(query)
  );

  let html = "<h2>Search Results</h2>";

  if(results.length === 0){
    html += "<p>No results found</p>";
  }

  results.forEach(f => {
    if(f.name.endsWith(".pdf")){
      html += `
        <div class="item" onclick="window.open('${f.download_url}','_blank')">
          📄 ${f.name}
        </div>`;
    } else {
      html += `
        <div class="item" onclick="openFolder('${f.path.replace(/\/g,'/')}')">
          📁 ${f.name}
        </div>`;
    }
  });

  document.getElementById("content").innerHTML = html;
}/contents/`)
  .then(r=>r.json())
  .then(data=>{
    let results="<h2>Search Results</h2>";

    data.forEach(folder=>{
      results+=`<div class='item' onclick="openFolder('${folder.name}')">📁 ${folder.name}</div>`;
    });

    document.getElementById("content").innerHTML=results;
  });
}

</script>

</body>
</html>
