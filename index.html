<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi5 Education Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* HEADER */
header{
  background:#0d6efd;
  color:white;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
}

/* MENU */
.menu{
  position:absolute;
  left:15px;
  top:15px;
  font-size:24px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#1c1c1c;
  color:white;
  transition:0.3s;
  padding-top:60px;
}

.sidebar a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
}

.sidebar a:hover{
  background:#333;
}

/* MAIN */
.container{
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* FILES */
.file{
  background:white;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.file:hover{
  background:#eef5ff;
}

</style>
</head>

<body>

<header>
<span class="menu" onclick="toggle()">☰</span>
Hi5 Education Centre
</header>

<div id="sidebar" class="sidebar">
<a href="#" onclick="home()">🏠 Dashboard</a>
<a href="#" onclick="openFolder('Nursery')">Nursery</a>
<a href="#" onclick="openFolder('Primary')">Primary</a>
<a href="#" onclick="openFolder('Secondary')">Secondary</a>
<a href="#" onclick="openFolder('Tertiary')">Tertiary</a>
<a href="#">🔍 Search</a>
<a href="#">ℹ About Us</a>
</div>

<div class="container" id="content">

<h2>Main Dashboard</h2>

<div class="cards">
<div class="card" onclick="openFolder('Nursery')">Nursery</div>
<div class="card" onclick="openFolder('Primary')">Primary</div>
<div class="card" onclick="openFolder('Secondary')">Secondary</div>
<div class="card" onclick="openFolder('Tertiary')">Tertiary</div>
</div>

</div>

<script>

let repo="hi5educentre256/hi5educentre256.github.io";

function toggle(){
  let sb=document.getElementById("sidebar");
  sb.style.left = sb.style.left=="0px" ? "-260px" : "0px";
}

function home(){
  location.reload();
}

/* STABLE FILE LOADER */
function openFolder(folder){

document.getElementById("content").innerHTML="<h2>"+folder+"</h2><p>Loading...</p>";

fetch("https://api.github.com/repos/"+repo+"/contents/"+folder)
.then(r=>r.json())
.then(data=>{

let html="<h2>"+folder+"</h2>";

data.forEach(f=>{

if(f.name.endsWith(".pdf")){
html+=`<div class="file" onclick="window.open('${f.download_url}','_blank')">📄 ${f.name}</div>`;
}

else{
html+=`<div class="file" onclick="openSub('${folder}/${f.name}')">📁 ${f.name}</div>`;
}

});

document.getElementById("content").innerHTML=html;

});

}

/* SUB FOLDERS */
function openSub(path){

document.getElementById("content").innerHTML="<h2>"+path+"</h2><p>Loading...</p>";

fetch("https://api.github.com/repos/"+repo+"/contents/"+path)
.then(r=>r.json())
.then(data=>{

let html="<h2>"+path+"</h2>";

data.forEach(f=>{
if(f.name.endsWith(".pdf")){
html+=`<div class="file" onclick="window.open('${f.download_url}','_blank')">📄 ${f.name}</div>`;
}
});

document.getElementById("content").innerHTML=html;

});

}

</script>

</body>
</html>
