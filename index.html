<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi5 Education Centre</title><style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

header{
  background:linear-gradient(90deg,#0d6efd,#198754);
  color:white;
  padding:12px 50px 12px 14px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.menu{position:absolute;right:12px;top:10px;font-size:26px;cursor:pointer;}

.banner{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.banner h3{
  font-size:26px;
  color:#0d6efd;
  margin:5px;
  text-transform:uppercase;
  font-weight:900;
}

.banner p{
  font-size:10px;
  color:#333;
  margin:4px;
}

.sidebar{
  position:fixed;
  left:-300px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  color:white;
  transition:0.3s;
  padding-top:60px;
  z-index:2000;
}

.sidebar a{
  display:block;
  padding:14px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-weight:600;
}

.sidebar a:hover{background:#333;}

.close{position:absolute;top:10px;right:10px;cursor:pointer;}

.container{padding:15px;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.card{
  background:linear-gradient(135deg,#ffffff,#eef5ff);
  padding:16px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.card:hover{transform:scale(1.03);}

.item{
  background:#fff;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

.item:hover{background:#eef5ff;}

</style></head><body><header>
Hi5 Education Centre
<span class="menu" onclick="toggleSidebar()">☰</span>
</header><div class="banner">
  <h3>HI5 EDUCATION CENTRE</h3>
  <p>Learn Today, Lead Tomorrow</p>
</div><div id="sidebar" class="sidebar">
  <div class="close" onclick="closeSidebar()">❌</div><a href="#" onclick="goHome(); closeSidebar();">🏠 ➜ Dashboard</a> <a href="#" onclick="go(['Nursery']); closeSidebar();">🧒 ➜ Nursery</a> <a href="#" onclick="go(['Primary']); closeSidebar();">📘 ➜ Primary</a> <a href="#" onclick="go(['Secondary']); closeSidebar();">🎓 ➜ Secondary</a> <a href="#" onclick="go(['Tertiary']); closeSidebar();">🏫 ➜ Tertiary</a> <a href="#" onclick="loadAbout(); closeSidebar();">ℹ ➜ About Us</a>

</div><div class="container" id="content">  <h2>Main Dashboard</h2>  <div class="cards">
    <div class="card" onclick="go(['Nursery'])">🧒 Nursery</div>
    <div class="card" onclick="go(['Primary'])">📘 Primary</div>
    <div class="card" onclick="go(['Secondary'])">🎓 Second Grade</div>
    <div class="card" onclick="go(['Tertiary'])">🏫 Tertiary</div>
    <div class="card" onclick="loadAbout()">ℹ About Us</div>
  </div></div><script>
let repo="hi5educentre256/hi5educentre256.github.io";
let historyStack=[];
let pdfList=[];

function toggleSidebar(){
  let sb=document.getElementById("sidebar");
  sb.style.left = "0px";
}

function closeSidebar(){
  document.getElementById("sidebar").style.left = "-300px";
}

function goHome(){ location.reload(); }

function go(pathArr){
  historyStack.push(document.getElementById("content").innerHTML);
  document.getElementById("content").innerHTML="Loading...";

  let path = pathArr.join("/");

  fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
  .then(r=>r.json())
  .then(data=>{

    let html="<button onclick='back()'>⬅ Back</button><h2>"+pathArr[pathArr.length-1]+"</h2>";
    pdfList=[];

    data.forEach(item=>{

      if(item.name.endsWith(".pdf")){
        pdfList.push(item.download_url);
        html+=`<div class='item' onclick='openPdf(${pdfList.length-1})'>📄 ${item.name}</div>`;
      }else{
        html+=`<div class='item' onclick='go(["${path}","${item.name}"])'>📁 ${item.name}</div>`;
      }

    });

    document.getElementById("content").innerHTML=html;
  });
}

function back(){
  if(historyStack.length>0){
    document.getElementById("content").innerHTML=historyStack.pop();
  }
}

function openPdf(i){
  window.open(pdfList[i],"_blank");
}

function loadAbout(){
  document.getElementById("content").innerHTML=`
  <div class='card'>
    <h2>About Us</h2>
    <p><b>Vision:</b> Quality digital learning for all learners</p>
    <p><b>Mission:</b> Provide accessible education materials</p>
    <p><b>Core Values:</b> Excellence, Integrity, Discipline</p>
  </div>`;
}
</script></body>
</html>
