<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi5 Education Centre LMS</title>  <style>
    body{
      font-family:Arial, sans-serif;
      margin:0;
      background:#f4f6f9;
    }

    .header{
      background:#1e88e5;
      color:#fff;
      padding:20px;
      text-align:center;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      background:#fff;
      border-radius:12px;
      padding:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      cursor:pointer;
      transition:0.3s;
      text-align:center;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card h3{
      margin:0;
      color:#1e88e5;
    }

    #files{
      padding:20px;
    }

    ul{
      list-style:none;
      padding:0;
    }

    li{
      background:#fff;
      margin:8px 0;
      padding:12px;
      border-radius:8px;
      box-shadow:0 2px 5px rgba(0,0,0,0.05);
    }

    a{
      text-decoration:none;
      color:#333;
      font-weight:bold;
    }

    .whatsapp{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:#fff;
      padding:14px 16px;
      border-radius:50px;
      text-decoration:none;
      font-weight:bold;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }

    .loading{
      padding:20px;
      font-weight:bold;
      color:#555;
    }
  </style></head>
<body>  <div class="header">
    <h1>Hi5 Education Centre LMS</h1>
    <p>Loving and Caring Minds</p>
  </div>  <div class="container">
    <div class="card" onclick="loadFolder('nursery')">
      <h3>Nursery</h3>
      <p>Baby, Middle, Top</p>
    </div><div class="card" onclick="loadFolder('primary')">
  <h3>Primary</h3>
  <p>P1 - P7</p>
</div>

<div class="card" onclick="loadFolder('secondary')">
  <h3>Secondary</h3>
  <p>S1 - S6</p>
</div>

<div class="card" onclick="loadFolder('university')">
  <h3>University</h3>
  <p>Courses</p>
</div>

  </div>  <div id="files">
    <div class="loading">Select a section to view files...</div>
  </div>  <a class="whatsapp" href="https://wa.me/256757826946" target="_blank">
    WhatsApp
  </a><script>
const repo = "hi5educentre256/hi5educentre256.github.io";

function loadFolder(folder){
  document.getElementById("files").innerHTML = "<div class='loading'>Loading...</div>";

  fetch(`https://api.github.com/repos/${repo}/contents/${encodeURIComponent(folder)}`)
    .then(res => res.json())
    .then(data => {

      if(!Array.isArray(data)){
        document.getElementById("files").innerHTML = "No files found or folder missing.";
        return;
      }

      let html = `<h2>${folder.toUpperCase()}</h2><ul>`;

      data.forEach(item => {
        if(item.type === "dir"){
          html += `<li>📁 <a href='${item.path}/index.html'>${item.name}</a></li>`;
        }else{
          html += `<li>📄 <a href='${item.path}' target='_blank'>${item.name}</a></li>`;
        }
      });

      html += "</ul>";
      document.getElementById("files").innerHTML = html;
    })
    .catch(err => {
      document.getElementById("files").innerHTML = "Error loading files.";
    });
}
</script></body>
</html>
